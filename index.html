<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sanmill Study Pages</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --line: rgba(148, 163, 184, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.16), transparent 32%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
      margin: 0 0 18px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .button.primary {
      background: var(--accent);
      color: #111827;
      border-color: transparent;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Sanmill</p>
    <h1>Study pages for Morris players</h1>
    <p>
      This site hosts official learning pages linked from the Sanmill app.
      The current study page focuses on Nine Men's Morris fundamentals for
      players who want practical ideas they can use right away.
    </p>
    <div class="actions">
      <a class="button primary" href="nmm-strategy/">Open the NMM study page</a>
      <a class="button" href="https://github.com/calcitem/Sanmill">View the Sanmill project</a>
    </div>
  </main>
</body>
</html>
