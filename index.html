<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sanmill Study Pages</title>
  <meta
    name="description"
    content="Official study pages linked from the Sanmill app."
    data-i18n-attr="content:meta.description"
  >
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: rgba(17, 24, 39, 0.9);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --line: rgba(148, 163, 184, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.16), transparent 32%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(780px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin: 0;
    }

    .language-picker {
      display: grid;
      gap: 6px;
      min-width: min(100%, 220px);
    }

    .language-picker span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .language-picker select {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
      margin: 0 0 16px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .button.primary {
      background: var(--accent);
      color: #111827;
      border-color: transparent;
    }

    @media (max-width: 640px) {
      main {
        padding: 24px;
      }

      .topline {
        flex-direction: column;
      }

      .language-picker {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topline">
      <p class="eyebrow" data-i18n="hero.eyebrow">Sanmill</p>
      <label class="language-picker">
        <span data-i18n="common.language">Language</span>
        <select data-locale-switcher aria-label="Language selector"></select>
      </label>
    </div>
    <h1 data-i18n="hero.title">Study pages for Morris players</h1>
    <p data-i18n="hero.lead">
      This site hosts official study pages linked from the Sanmill app.
    </p>
    <p data-i18n="hero.sublead">
      Open the Nine Men's Morris page for quick strategy notes, short drills,
      and practical next steps.
    </p>
    <div class="actions">
      <a class="button primary" href="nmm-strategy/" data-i18n="actions.study">
        Open the NMM study page
      </a>
      <a class="button" href="https://github.com/calcitem/Sanmill" data-i18n="actions.project">
        View the Sanmill project
      </a>
    </div>
  </main>
  <script type="module">
    import { initLocalizedPage } from "./assets/localized-pages.js";
    initLocalizedPage("home");
  </script>
</body>
</html>
