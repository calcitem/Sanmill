name: Lint & Static Analysis

# Runs static analysis and Rust validation on changes that affect the Flutter
# frontend, FRB bindings, or Rust/TGF workspace.

on:
  push:
    branches: [release]
    paths:
      - '.github/workflows/lint.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**'
      - 'scripts/check_perf_baseline.py'
      - 'scripts/record_rust_perf_baseline.py'
      - 'scripts/generate_frb.sh'
      - 'scripts/ensure_frb_codegen.sh'
      - '.github/actions/generate-frb/**'
      - 'tests/perf_baseline.toml'
      - 'src/ui/flutter_app/**/*.dart'
      - 'src/ui/flutter_app/pubspec.yaml'
      - 'src/ui/flutter_app/pubspec.lock'
      - 'src/ui/flutter_app/flutter_rust_bridge.yaml'
      - 'src/ui/flutter_app/rust_builder/**'
  pull_request:
    types: [review_requested, ready_for_review]
    paths:
      - '.github/workflows/lint.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'crates/**'
      - 'scripts/check_perf_baseline.py'
      - 'scripts/record_rust_perf_baseline.py'
      - 'scripts/generate_frb.sh'
      - 'scripts/ensure_frb_codegen.sh'
      - '.github/actions/generate-frb/**'
      - 'tests/perf_baseline.toml'
      - 'src/ui/flutter_app/**/*.dart'
      - 'src/ui/flutter_app/pubspec.yaml'
      - 'src/ui/flutter_app/pubspec.lock'
      - 'src/ui/flutter_app/flutter_rust_bridge.yaml'
      - 'src/ui/flutter_app/rust_builder/**'

jobs:
  # -------------------------------------------------------------------------
  # Gate 1: Dart/Flutter strict analysis
  # -------------------------------------------------------------------------
  dart-analyze:
    name: dart analyze (strict)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install Flutter dependencies
        working-directory: src/ui/flutter_app
        run: flutter pub get

      - name: Run dart analyze (strict)
        working-directory: src/ui/flutter_app
        run: |
          dart analyze --fatal-infos --fatal-warnings . 2>&1 | tee /tmp/dart_analyze.txt
          exit ${PIPESTATUS[0]}

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-results
          path: /tmp/dart_analyze.txt

  # -------------------------------------------------------------------------
  # Gate 2: Rust cargo clippy
  # Only runs when crates/ directory exists (Phase 1+).
  # -------------------------------------------------------------------------
  cargo-clippy:
    name: cargo clippy (deny warnings)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check if Rust workspace exists
        id: rust_check
        run: |
          if [ -f "Cargo.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Rust workspace not yet created (Phase 1); skipping."
          fi

      - name: Set up Rust toolchain
        if: steps.rust_check.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Generate FRB bindings
        if: steps.rust_check.outputs.exists == 'true'
        uses: ./.github/actions/generate-frb

      - name: Cache Rust build artifacts
        if: steps.rust_check.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy --deny warnings
        if: steps.rust_check.outputs.exists == 'true'
        run: |
          cargo clippy --workspace --all-targets --all-features \
            -- -D warnings 2>&1 | tee /tmp/clippy.txt
          exit ${PIPESTATUS[0]}

      - name: Upload clippy results
        if: always() && steps.rust_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: clippy-results
          path: /tmp/clippy.txt

  # -------------------------------------------------------------------------
  # Gate 3: cargo fmt check
  # Only runs when crates/ directory exists (Phase 1+).
  # -------------------------------------------------------------------------
  cargo-fmt:
    name: cargo fmt (check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check if Rust workspace exists
        id: rust_check
        run: |
          if [ -f "Cargo.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Rust toolchain
        if: steps.rust_check.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # rustfmt resolves `mod frb_generated;` while parsing, so the
      # gitignored generated file must exist even for a format check.
      - name: Generate FRB bindings
        if: steps.rust_check.outputs.exists == 'true'
        uses: ./.github/actions/generate-frb

      - name: Check formatting
        if: steps.rust_check.outputs.exists == 'true'
        run: cargo fmt --all -- --check


  # -------------------------------------------------------------------------
  # Gate 4: Rust tests
  # Runs the full Rust workspace test suite.  This catches behavioral issues
  # that clippy/fmt cannot see, including Rust-vs-C++ differential tests.
  # -------------------------------------------------------------------------
  cargo-test:
    name: cargo test (workspace)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check if Rust workspace exists
        id: rust_check
        run: |
          if [ -f "Cargo.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Rust toolchain
        if: steps.rust_check.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Generate FRB bindings
        if: steps.rust_check.outputs.exists == 'true'
        uses: ./.github/actions/generate-frb

      - name: Cache Rust build artifacts
        if: steps.rust_check.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test --workspace
        if: steps.rust_check.outputs.exists == 'true'
        run: cargo test --workspace --all-features

  # -------------------------------------------------------------------------
  # Gate 5: Rust performance baseline smoke check
  # Runs the Rust TGF benchmark, writes TOML, and compares it with
  # tests/perf_baseline.toml using the same threshold script used for C++.
  # Empty/zero baseline fields are skipped until the baseline is populated.
  # -------------------------------------------------------------------------
  rust-perf-baseline:
    name: rust perf baseline (smoke)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check if Rust workspace exists
        id: rust_check
        run: |
          if [ -f "Cargo.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Rust toolchain
        if: steps.rust_check.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Generate FRB bindings
        if: steps.rust_check.outputs.exists == 'true'
        uses: ./.github/actions/generate-frb

      - name: Cache Rust build artifacts
        if: steps.rust_check.outputs.exists == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Record Rust perf result
        if: steps.rust_check.outputs.exists == 'true'
        run: python3 scripts/record_rust_perf_baseline.py --release --output target/tgf_perf_result.toml

      - name: Compare Rust perf result with baseline
        if: steps.rust_check.outputs.exists == 'true'
        run: python3 scripts/check_perf_baseline.py --sanity-floor --baseline tests/perf_baseline.toml --result target/tgf_perf_result.toml

      - name: Upload Rust perf result
        if: always() && steps.rust_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rust-perf-result
          path: target/tgf_perf_result.toml
