name: CUI

on:
  push:
    branches: [release]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'tests/**/*.cpp'
  pull_request:
    types: [review_requested, ready_for_review]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'tests/**/*.cpp'

jobs:
  cygwin-gcc:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Cygwin
        uses: cygwin/cygwin-install-action@master
        with:
          platform: x86_64
          packages: make gcc-g++

      # Build
      - name: Build with cygwin-g++
        run: cd src; make -j build ARCH=x86-64

      # Archive
      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: sanmill_cygwin-g++.exe
          path: src/sanmill.exe

  linux-gcc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Export environment valuables
        run: export

      - name: Print g++ version
        run: g++ -v

      - name: Create version
        run: git fetch --tags; git tag; git log -n1; bash -x ./version.sh

      # Build engine + test suite
      - name: Build with linux-g++
        run: cd src; make -j build ARCH=x86-64

      - name: Build test suite
        run: cd src; make -j test ARCH=x86-64

      # Run golden + unit tests (Phase 0 safety-net)
      - name: Run unit and golden tests
        run: cd src; ./test_sanmill --gtest_output=xml:../test-results/gtest.xml
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gtest-results-linux
          path: test-results/

      # Archive
      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: sanmill_linux-g++
          path: src/sanmill

  linux-gcc-clang-tidy:
    runs-on: ubuntu-latest
    # Static analysis gate: enforces code-quality baseline for the TGF
    # refactoring.  Failures are non-blocking warnings until the Rust
    # migration is complete (set continue-on-error: false once baseline
    # is clean).
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy on changed files
        run: |
          cd src
          # Generate a compile_commands.json so clang-tidy can resolve includes.
          # We rely on bear or compile_commands_gen here; fall back to a
          # simple header-only check if bear is unavailable.
          if command -v bear &>/dev/null; then
            bear -- make -j build ARCH=x86-64 2>/dev/null || true
          else
            echo "bear not found; skipping compile_commands.json generation"
          fi
          find . -maxdepth 1 -name '*.cpp' ! -name 'main.cpp' | \
            xargs --no-run-if-empty clang-tidy \
              --checks='-*,clang-analyzer-*,cppcoreguidelines-*,modernize-*' \
              --warnings-as-errors='' \
              -- -std=c++17 -I. 2>&1 | tee /tmp/clang-tidy.txt || true
          echo "clang-tidy done (informational)"
        continue-on-error: true

  darwin-gcc:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Export environment valuables
        run: export

      - name: Print g++ version
        run: g++ -v

      # Build
      - name: Build with darwin-g++
        run: cd src; make -j build ARCH=x86-64

      # Archive
      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: sanmill_darwin-g++
          path: src/sanmill

