name: F-Droid Online Exclusion

on:
  pull_request:
    paths:
      - 'src/ui/flutter_app/lib/main_fdroid.dart'
      - 'src/ui/flutter_app/lib/online_play/**'
      - 'src/ui/flutter_app/lib/shared/services/environment_config.dart'
      - 'src/ui/flutter_app/lib/shared/services/diagnostic_report_service.dart'
      - 'src/ui/flutter_app/android/app/build.gradle_fdroid'
      - 'src/ui/flutter_app/android/app/src/fdroid/**'
      - 'scripts/verify-fdroid-online-exclusion.sh'
      - '.github/workflows/fdroid-online-exclusion.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true
      - name: Initialize Flutter and Rust bridge
        run: ./flutter-init.sh
      - name: Select F-Droid Gradle configuration
        working-directory: src/ui/flutter_app
        run: cp android/app/build.gradle_fdroid android/app/build.gradle
      - name: Build F-Droid APK from its isolated entry point
        working-directory: src/ui/flutter_app
        run: flutter build apk --flavor fdroid --release --target lib/main_fdroid.dart
      - name: Verify online module exclusion
        run: bash scripts/verify-fdroid-online-exclusion.sh src/ui/flutter_app/build/app/outputs/flutter-apk/app-fdroid-release.apk
        env:
          SANMILL_ONLINE_HOST: ${{ vars.SANMILL_ONLINE_HOST }}
