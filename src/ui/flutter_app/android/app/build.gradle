import java.net.URI

plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Keep every Sanmill Android distribution on the lowest API level supported
// by the Dart 3.12 Flutter toolchain and the current plugin graph.
def sanmillMinSdkVersion = 24
def dartDefines = [:]
if (project.hasProperty('dart-defines')) {
    project.property('dart-defines').split(',').each { encoded ->
        def pair = new String(encoded.decodeBase64(), 'UTF-8').split('=', 2)
        if (pair.length == 2) {
            dartDefines[pair[0]] = pair[1]
        }
    }
}
def sanmillOnlineHost = project.findProperty('SANMILL_ONLINE_HOST') ?: System.getenv('SANMILL_ONLINE_HOST')
if (!sanmillOnlineHost && dartDefines['SANMILL_ONLINE_BASE_URL']) {
    sanmillOnlineHost = new URI(dartDefines['SANMILL_ONLINE_BASE_URL']).host
}
sanmillOnlineHost = sanmillOnlineHost ?: 'sanmill-online.invalid'
if (!(sanmillOnlineHost ==~ /[A-Za-z0-9.-]+/)) {
    throw new GradleException('SANMILL_ONLINE_HOST must be a valid host name')
}

android {
    ndkVersion "28.2.13676358"

    compileSdkVersion 36
    namespace "com.calcitem.sanmill"

    lintOptions {
        disable 'InvalidPackage'
    }

    defaultConfig {
        applicationId "com.calcitem.sanmill"
        minSdkVersion sanmillMinSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        manifestPlaceholders["sanmillOnlineHost"] = sanmillOnlineHost
        ndk {
            ldLibs "log"
            debugSymbolLevel 'FULL'
        }
        externalNativeBuild {
            cmake {
                //arguments "-DANDROID_ARM_MODE=arm", "-DANDROID_STL=c++_shared"
                //abiFilters "arm64-v8a"
            }
        }
    }

    signingConfigs {
        debug {
        }
    }
    buildTypes {
        debug {
            ndk {
                debugSymbolLevel 'FULL'
            }
            minifyEnabled false
            shrinkResources false
        }
        release {
            signingConfig signingConfigs.debug
            // Enabling minification to ensure ProGuard/R8 runs and applies the rules
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }
}

flutter {
    source '../..'
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
}
