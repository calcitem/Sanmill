; Sanmill benchmark preset for validating human-inspired heuristics.
; Usage example:
;   sanmill.exe benchmark --ini benchmark_human_heuristics.ini
;
; Run the same command on the baseline commit and on the heuristic-enhanced
; commit, then compare:
;   - Traditional win rate
;   - Draw rate
;   - Average moves / game length
;   - Total runtime
;
; Keep shuffling and opening book disabled for a stable A/B comparison.

[Options]
TotalGames=200
SkillLevel=15
MoveTime=1
Algorithm=2
AiIsLazy=false
AutoRestart=false
AutoChangeFirstMove=false
ResignIfMostLose=false
Shuffling=false
LearnEndgameEnabled=false
UsePerfectDatabase=true
PerfectDatabasePath=D:\user\Documents\strong
DrawOnHumanExperience=true
ConsiderMobility=true
FocusOnBlockingPaths=false
OpeningBook=false
TrapAwareness=false
NMoveRule=100
IDS=false
DepthExtension=true
DeveloperMode=false
