# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-21T11:45:40+00:00"
git_commit = "b404f2dee+working-tree (TT age cache)"
platform = "linux-x86_64 KVM 4 vCPU Intel Xeon E5-2680 v4 @ 2.40GHz"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master 'target/release/tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 7 --timeout 240"
supplemental_command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master 'target/release/tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases moving_loop,capture_pending --skills 15 --depths 18 --repeat 5 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Re-collected in the current Linux/KVM workspace after the previous locked data came from a different high-performance Windows PC (AMD Ryzen 9 7950X3D). Do not compare elapsed time across those machines. TGF_PREFETCH_MODE was unset, so the CLI used its current default. The command intentionally uses the same Rust binary for current/master labels; this file locks the next-branch Rust baseline, while master remains the external parity reference. This lock includes the accepted standard move-generation branch hoist, lazy moving-phase block-score cache, and Searcher-cached TT generation age. Raw CSVs during collection: /tmp/sanmill-perf/search_after_tt_age_cache_primary.csv and /tmp/sanmill-perf/search_after_tt_age_cache_moving.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

