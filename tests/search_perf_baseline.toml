# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T09:38:36Z"
git_commit = "fc9d066b3+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_before_shared_topology_tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 11 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after sharing immutable Mill topology data across MillRules instances, shrinking MillRules from 184 to 64 bytes and MillWorkbench from 360 to 240 bytes. Same-run A/B kept bestmove/score/nodes unchanged; timing was mixed at 1.044x start and 1.001x reduced_material, while the locked-baseline check still passed. Raw candidate CSV: /tmp/sanmill_shared_topology_r11.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

