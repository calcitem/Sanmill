# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T13:52:52Z"
git_commit = "5164064c1+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_perf_head_target/release/tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 7 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after adding a batch move-order scoring hook and a Mill node-local scorer that reuses side bitboards, phase flags, and standard-rule booleans across one generated move list. Same-run A/B against 5164064c1 kept bestmove/score/nodes unchanged; timing was 0.937x start and 0.908x reduced_material. Raw candidate CSV: /tmp/sanmill_move_order_batch_scores_r7.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

[[cases]]
name = "start"
skill = 15
requested_depth = 12
bestmove = "d6"
score = 3
depth = 12
nodes = 5_580_055
median_ms = 1098.21
ns_per_node = 196.81
run_ms = [1098.21, 1078.32, 1131.92, 992.49, 1176.33, 1079.00, 1170.98]

