# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T12:07:04Z"
git_commit = "d2a447b51+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_before_page_aligned_tt_tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 11 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after moving the packed TT slot array to a 4096-byte page-aligned allocation and issuing a Linux MADV_HUGEPAGE hint while keeping each TtCluster at 8 bytes. Same-run A/B against d2a447b51 kept bestmove/score/nodes unchanged; timing was 0.840x start and 0.883x reduced_material. Raw candidate CSV: /tmp/sanmill_page_aligned_tt_thp_r11.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

[[cases]]
