# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-21T13:00:44+00:00"
git_commit = "00f46123a+working-tree (fly stalemate scan bypass)"
platform = "linux-x86_64 KVM 4 vCPU Intel Xeon E5-2680 v4 @ 2.40GHz"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill-before-fly-stalemate-tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 7 --timeout 240"
supplemental_command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill-before-fly-stalemate-tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases moving_loop,capture_pending --skills 15 --depths 18 --repeat 5 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Re-collected in the current Linux/KVM workspace after accepting the fly-threshold stalemate scan bypass. Do not compare elapsed time across different machines. TGF_PREFETCH_MODE was unset, so the CLI used its current default. The master label in the command is the saved previous Rust/TGF binary at 00f46123a, not the legacy C++ engine. Master remains the external parity reference for broader audits. This lock includes the accepted standard move-generation branch hoist, lazy moving-phase block-score cache, Searcher-cached TT generation age, Mill remove-order score cache, and fly-threshold stalemate scan bypass. Raw CSVs during collection: /tmp/sanmill-perf/search_fly_stalemate_lazy_count_vs_00f_start_r7.csv, /tmp/sanmill-perf/search_fly_stalemate_lazy_count_vs_00f_reduced_r7.csv, /tmp/sanmill-perf/search_fly_stalemate_lazy_count_vs_00f_moving.csv, and /tmp/sanmill-perf/search_fly_stalemate_lazy_count_vs_00f_moving_loop_r11.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

