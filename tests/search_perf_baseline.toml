# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-21T12:41:54+00:00"
git_commit = "ed4f4d992+working-tree (remove-order score cache)"
platform = "linux-x86_64 KVM 4 vCPU Intel Xeon E5-2680 v4 @ 2.40GHz"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill-before-remove-order-cache-tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 5 --timeout 240"
supplemental_command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill-before-remove-order-cache-tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases moving_loop,capture_pending --skills 15 --depths 18 --repeat 5 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Re-collected in the current Linux/KVM workspace after accepting the Mill remove-order score cache. Do not compare elapsed time across different machines. TGF_PREFETCH_MODE was unset, so the CLI used its current default. The master label in the command is the saved previous Rust/TGF binary at ed4f4d992, not the legacy C++ engine. Master remains the external parity reference for broader audits. This lock includes the accepted standard move-generation branch hoist, lazy moving-phase block-score cache, Searcher-cached TT generation age, and Mill remove-order score cache. Raw CSVs during collection: /tmp/sanmill-perf/search_remove_order_cache_vs_ed4f_primary.csv, /tmp/sanmill-perf/search_remove_order_cache_vs_ed4f_moving.csv, and /tmp/sanmill-perf/search_remove_order_cache_vs_ed4f_capture_r11.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

