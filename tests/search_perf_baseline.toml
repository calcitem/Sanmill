# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T04:18:35Z"
git_commit = "4069849b6+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_master_engine_perf' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 7 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after stack-backed capture-line lists and mill-line member masks for remove/capture filtering on top of adjacency masks, star-square masks, bitboard mobility counts, and empty-neighbor move-generation prechecks. Master parity was exact, but runtime checks should compare future Rust candidates against these current Rust numbers."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

[[cases]]
name = "start"
skill = 15
requested_depth = 12
bestmove = "d6"
score = 3
depth = 12
nodes = 5_580_055
median_ms = 1317.65
ns_per_node = 236.14
run_ms = [1367.15, 1473.96, 1399.51, 1264.33, 1298.85, 1317.65, 1291.41]

