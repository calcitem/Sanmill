# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T05:25:25Z"
git_commit = "61599694e+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_before_alloc_lock_tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 7 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after moving the search repetition stack to fixed ArrayVec storage, making worker-local MCTS node counters plain integers, and replacing one-shot lazy-SMP/MCTS channel dispatch with direct JoinHandles. The master engine remains the broad parity reference, but future next-branch optimization timing should compare against these Rust/TGF numbers before drawing conclusions."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

[[cases]]
name = "start"
skill = 15
requested_depth = 12
bestmove = "d6"
score = 3
depth = 12
nodes = 5_580_055
median_ms = 1341.48
ns_per_node = 240.41
run_ms = [1342.80, 1283.71, 1405.43, 1146.08, 1341.48, 1293.79, 1451.95]

