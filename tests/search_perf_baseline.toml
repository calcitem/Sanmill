# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T08:59:50Z"
git_commit = "dad59ffa9+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_before_alloc_lock_tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 11 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after dropping the unused Action payload from packed TT entries and removing dead TT-move ordering scaffolding. Same-run A/B against /tmp/sanmill_before_alloc_lock_tgf showed unchanged bestmove/score/nodes and medians 0.981x start / 0.995x reduced_material. Raw candidate CSV: /tmp/sanmill_tt_entry_drop_action_r11.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

