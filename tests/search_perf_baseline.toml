# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-19T09:56:39Z"
git_commit = "46dcf11d9+working-tree"
platform = "linux-x86_64-local"
build_flags = "cargo build --release -p tgf-cli"
command = "python3 scripts/compare_engine_perf.py --current 'target/release/tgf uci' --master '/tmp/sanmill_before_delta_undo_tgf uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 11 --timeout 240"
summary_method = "median elapsed_ms from current engine rows"
notes = "Locked after splitting MillUndoCore into a 72-byte standard-rule delta undo and a boxed 112-byte full fallback for non-standard rule state, shrinking MillUndoState from 128 to 88 bytes on the standard search path. Same-run A/B against 46dcf11d9 kept bestmove/score/nodes unchanged; timing was 0.994x start and 0.942x reduced_material. Raw candidate CSV: /tmp/sanmill_delta_undo_r11.csv."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

