# tests/search_perf_baseline.toml
#
# Search performance baseline for comparing future next-branch optimizations
# against the last locked Rust/TGF result. This is intentionally separate
# from tests/perf_baseline.toml, which holds conservative CI floors and perft
# gates.
#
# Use the legacy master engine for parity and broad context, but use this file
# to decide whether a candidate got faster or slower than the previous Rust
# baseline. Comparing only against master can hide regressions between two
# next-branch revisions.

[meta]
locked_at = "2026-06-21T07:45:00+08:00"
git_commit = "69193db4a+working-tree (prefetch default-on)"
platform = "windows-x86_64 AMD Ryzen 9 7950X3D (Zen4, 3D V-Cache)"
build_flags = "cargo build --release -p tgf-cli"
command = "python scripts/compare_engine_perf.py --current 'target/release/tgf.exe uci' --master 'target/release/tgf.exe uci' --current-depth-go 'gomtdf {depth}' --master-depth-go 'gomtdf {depth}' --cases start,reduced_material --skills 15 --depths 12 --repeat 7 --timeout 120"
summary_method = "median elapsed_ms from current engine rows"
notes = "Re-collected on a high-performance Windows PC (AMD Ryzen 9 7950X3D) after enabling full TT prefetch by default (TGF_PREFETCH_MODE unset => all). Node counts, bestmove, and score are unchanged from the prior baseline (parity preserved); only timing improved. AMD uProf 'assess' on a 6x start-d12 workload showed off->all: IPC 1.59->2.39, CPI 0.628->0.419, CYCLES_NOT_IN_HALT -33% at equal RETIRED_INST. Prefetch is a node-preserving latency-hiding win on this Zen4/V-Cache part; override with TGF_PREFETCH_MODE=off/first. Prior baseline (slow PC, prefetch off): start 1098.21 ms / 196.81 ns-node, reduced_material 835.00 ms / 260.13 ns-node."

[thresholds]
max_elapsed_regress_pct = 8.0
require_bestmove = true
require_score = true
require_depth = true
require_nodes = true

[[cases]]
name = "start"
skill = 15
requested_depth = 12
bestmove = "d6"
score = 3
depth = 12
nodes = 5_580_055
median_ms = 344.19
ns_per_node = 61.68
run_ms = [367.71, 337.04, 334.74, 366.02, 344.19, 332.45, 359.14]

[[cases]]
name = "reduced_material"
skill = 15
requested_depth = 12
bestmove = "c4-b4"
score = -89
