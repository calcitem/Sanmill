# tests/perf_baseline.toml
#
# Performance baseline for the TGF refactoring safety-net.
#
# WHAT'S LOCKED:
#   * `[baseline.perft]` — deterministic node counts.  Any non-zero value
#     here is a HARD GATE: the result must match exactly.  CI fails if a
#     `result.toml` is missing the same key or returns a different number.
#   * `[baseline]` runtime metrics — Iteration 3 freezes them at *very*
#     conservative values that any modern Linux CI runner should comfortably
#     beat.  This activates the relative regression thresholds below
#     (5 % NPS drop / 5 % depth-time increase / 1 pp TT-hit drop / 10 %
#     first-move increase) instead of the previous "skip baseline-not-
#     populated" message.  The numbers will be tightened to ~70 % of the
#     canonical CI run once we have a stable reference build.
#
# REGRESSION THRESHOLDS (when both baseline and result are non-zero):
#     NPS:              <= 5 % drop allowed
#     depth10_ms:       <= 5 % increase allowed
#     perft_nodes:      exactly 0 change allowed (gold standard)
#     tt_hit_rate_pp:   <= 1 percentage-point drop allowed
#     first_move_ms:    <= 10 % increase allowed
#
# CI also passes `--sanity-floor` so absolute lower bounds (NPS >= 100k,
# depth10_ms <= 10s, tt_hit_rate >= 1 %) remain enforced even on hardware
# that meets the relative threshold.  The two layers are complementary:
# `--sanity-floor` rejects catastrophic dropouts, the relative threshold
# rejects gradual regressions.
#
# REGENERATION:
#   1. Run  `cargo run --release -p tgf-cli -- bench`  to print a TOML
#      block with up-to-date perft values for the current Rust impl.
#   2. Copy the `[baseline.perft]` section into this file (only edit perft
#      fields manually; runtime metrics belong here once canonical CI
#      hardware is fixed).
#   3. Commit the updated file with the new values.

[meta]
# Stamped manually when freezing a new baseline.
locked_at   = "2026-04-27T07:30:00Z"
git_commit  = ""         # short SHA of the commit that froze this baseline
platform    = "ci-linux-x86_64"
build_flags = "cargo run --release -p tgf-cli -- bench"
notes       = "Iteration 3: runtime metrics locked at conservative floors; tighten after a stable CI reference run."

[baseline]
# Conservative runtime baselines.  Values are an order of magnitude below
# what the local Windows reference machine measures (NPS ~4M, depth10 ~5 ms,
# TT hit rate 100%, first-move ~0 ms) so any reasonable CI runner can clear
# them.  When they fire, that is a real regression — not a hardware quirk.
nps        = 500_000
depth10_ms = 100

# --------------------------------------------------------------------------
# Deterministic perft node counts.  These are HARD GATES: any non-zero
# baseline value must be reproduced exactly by the result file.
#
# Values verified against the mature C++ engine via tgf-frb differential
# tests (see crates/tgf-frb/src/api/simple.rs::native_and_legacy_perft_match).
# --------------------------------------------------------------------------
[baseline.perft]
# 9MM start position: 24 empty squares = 24 legal placements.
start_d1 = 24

# Depth 2 from start: 24 white placements × 23 black responses = 552.
start_d2 = 552

# Mid-game perft from the canonical 18-piece "no-mill moving-phase" fixture
# defined in crates/tgf-mill::no_mill_moving_phase_snapshot.  Verified to
# match between the Rust MillRules implementation and the C++ engine.
mid_d3 = 531

# --------------------------------------------------------------------------
# Transposition-table hit rate (percentage points, 0-100).  Conservative
# floor; the current Rust scaffold measures 100 % at the bench depth.
# --------------------------------------------------------------------------
[baseline.tt]
hit_rate_pct = 50.0

# --------------------------------------------------------------------------
# Cold-start time: process launch to first legal-move response.
# Conservative ceiling; current Rust scaffold reports 0 ms.
# --------------------------------------------------------------------------
[baseline.startup]
first_move_ms = 200
